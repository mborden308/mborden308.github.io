name: Sync Lightroom Galleries

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:

  # Run weekly on Sundays at midnight UTC
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync photos from Lightroom
        env:
          LIGHTROOM_API_KEY: ${{ secrets.LIGHTROOM_API_KEY }}
          LIGHTROOM_CLIENT_SECRET: ${{ secrets.LIGHTROOM_CLIENT_SECRET }}
          LIGHTROOM_REFRESH_TOKEN: ${{ secrets.LIGHTROOM_REFRESH_TOKEN }}
        run: node scripts/sync-lightroom.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/gallery/ _data/galleries.yml
          git commit -m "Auto-sync Lightroom galleries [skip ci]"
          git push
